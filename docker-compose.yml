services:
  postgres:
    image: postgres:16-alpine
    container_name: workforce-db
    environment:
      POSTGRES_USER: workforce
      POSTGRES_PASSWORD: workforce_password
      POSTGRES_DB: workforce
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  n8n:
    image: n8nio/n8n:latest
    container_name: workforce-n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=workforce
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=workforce
      - DB_POSTGRESDB_PASSWORD=workforce_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - /Volumes/nfs/scan:/mnt/scan:ro
      - /Users/perttu/projects/kuitit:/opt/kuitit:ro
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
